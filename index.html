<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World of Tomorrow</title>
  <style>
    :root {
      --overlay: rgba(6, 18, 30, 0.58);
      --panel: rgba(255, 255, 255, 0.14);
      --text: #f5f7fb;
      --accent: #ffd166;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        linear-gradient(var(--overlay), var(--overlay)),
        url("futurama-worker.jpg") center center / cover no-repeat fixed;
      display: grid;
      place-items: center;
    }

    main {
      width: min(920px, calc(100% - 3rem));
      padding: 3rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 28px;
      background: var(--panel);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      text-align: center;
    }

    p {
      margin: 0 0 1rem;
      font-size: 0.95rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 10vw, 6.5rem);
      line-height: 0.92;
      text-transform: uppercase;
      text-shadow: 0 12px 30px rgba(0, 0, 0, 0.45);
    }

    @media (max-width: 640px) {
      main {
        padding: 2rem 1.25rem;
      }

      p {
        letter-spacing: 0.18em;
      }
    }
  </style>
</head>
<body>
  <main>
    <p>Futurama Inspired Landing Page</p>
    <h1>Hello and welcome to the world of tomorrow</h1>
  </main>
</body>
</html>
