<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>James A St. Hill | Resume</title>
  <style>
    :root {
      --bg-dark: rgba(7, 18, 31, 0.86);
      --line: rgba(255, 255, 255, 0.16);
      --text: #f5f7fb;
      --accent: #f2c46f;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background: linear-gradient(rgba(7, 18, 31, 0.94), rgba(7, 18, 31, 0.9));
      overflow-x: hidden;
    }

    .layout {
      min-height: 100vh;
      display: flex;
      align-items: stretch;
    }

    .side-window {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
      width: 96px;
      height: 100vh;
      padding: 2rem 1.1rem;
      background: linear-gradient(180deg, rgba(6, 17, 29, 0.92), rgba(8, 23, 38, 0.84));
      border-right: 1px solid var(--line);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: width 220ms ease, background 220ms ease;
    }

    .side-window:hover,
    .side-window:focus-within {
      width: 340px;
      background: linear-gradient(180deg, rgba(7, 18, 31, 0.97), rgba(12, 29, 47, 0.92));
    }

    .nameplate {
      margin-bottom: 2.5rem;
      opacity: 0;
      transform: translateX(-12px);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .side-window:hover .nameplate,
    .side-window:focus-within .nameplate {
      opacity: 1;
      transform: translateX(0);
    }

    .nameplate h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 0.98;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .nameplate span {
      display: block;
      margin-top: 0.8rem;
      color: var(--accent);
      font-size: 0.92rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    .rail-label {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      margin: 0 auto;
      font-size: 0.9rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--accent);
      transition: opacity 180ms ease;
    }

    .side-window:hover .rail-label,
    .side-window:focus-within .rail-label {
      opacity: 0;
    }

    nav {
      display: grid;
      gap: 0.85rem;
    }

    .nav-link {
      display: block;
      padding: 0.95rem 1rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      opacity: 0;
      transform: translateX(-10px);
      transition: background 180ms ease, border-color 180ms ease, opacity 180ms ease, transform 180ms ease;
    }

    .side-window:hover .nav-link,
    .side-window:focus-within .nav-link {
      opacity: 1;
      transform: translateX(0);
    }

    .nav-link:hover,
    .nav-link:focus-visible,
    .nav-link.active {
      background: rgba(242, 196, 111, 0.15);
      border-color: rgba(242, 196, 111, 0.45);
      outline: none;
    }

    .content {
      width: 100%;
      margin-left: 96px;
      padding: 4rem 3rem;
    }

    .resume-shell {
      width: min(1120px, 100%);
      margin: 0 auto;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 30px;
      background: rgba(248, 250, 253, 0.94);
      color: #16202b;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .resume-header {
      padding: 2.75rem 2.5rem 1.5rem;
      background:
        radial-gradient(circle at top right, rgba(242, 196, 111, 0.3), transparent 28%),
        linear-gradient(135deg, #f8fafc, #edf2f7);
      border-bottom: 1px solid rgba(22, 32, 43, 0.08);
    }

    .resume-header h2 {
      margin: 0;
      font-size: clamp(2.2rem, 5vw, 3.6rem);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .resume-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 1.5rem;
    }

    .button-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 190px;
      padding: 0.9rem 1.25rem;
      border-radius: 999px;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.9rem;
    }

    .button-primary {
      background: #132435;
      color: #f8fafc;
    }

    .button-secondary {
      border: 1px solid rgba(19, 36, 53, 0.18);
      color: #132435;
      background: rgba(19, 36, 53, 0.04);
    }

    .resume-viewer {
      padding: 1.5rem;
      background:
        radial-gradient(circle at top right, rgba(242, 196, 111, 0.12), transparent 22%),
        linear-gradient(180deg, rgba(229, 234, 241, 0.8), rgba(243, 246, 249, 1));
    }

    .resume-document {
      display: block;
      width: 100%;
      min-height: 82vh;
      border: 1px solid rgba(19, 36, 53, 0.08);
      border-radius: 20px;
      background: white;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.12);
    }

    @media (max-width: 900px) {
      .side-window,
      .side-window:hover,
      .side-window:focus-within {
        width: 100%;
        height: auto;
        position: sticky;
        padding: 1rem;
      }

      .rail-label {
        display: none;
      }

      .nameplate,
      .nav-link {
        opacity: 1;
        transform: none;
      }

      .content {
        margin-left: 0;
        padding: 1.25rem;
      }

      .resume-header {
        padding: 2rem 1.4rem;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="side-window" aria-label="Site navigation">
      <div class="rail-label">Hover to Explore</div>
      <div class="nameplate">
        <h1>James A St. Hill</h1>
        <span>Portfolio</span>
      </div>
      <nav>
        <a class="nav-link" href="index.html">Dashboard</a>
        <a class="nav-link active" href="resume.html">Resume</a>
      </nav>
    </aside>

    <main class="content">
      <section class="resume-shell" aria-labelledby="resume-title">
        <header class="resume-header">
          <h2 id="resume-title">Resume</h2>
          <div class="resume-actions">
            <a class="button-link button-primary" href="index.html">Back to Dashboard</a>
            <a class="button-link button-secondary" href="Resume.pdf" target="_blank" rel="noopener noreferrer">Open Resume PDF</a>
          </div>
        </header>
        <div class="resume-viewer">
          <object
            class="resume-document"
            data="Resume.pdf#view=FitH"
            type="application/pdf">
            <iframe
              class="resume-document"
              src="Resume.pdf#view=FitH"
              title="James A St. Hill Resume PDF">
            </iframe>
          </object>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
